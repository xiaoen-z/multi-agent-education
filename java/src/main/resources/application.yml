server:
  port: 8080

spring:
  application:
    name: multi-agent-education
  datasource:
    url: jdbc:h2:mem:edudb
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
  h2:
    console:
      enabled: true
  ai:
    openai:
      api-key: ${OPENAI_API_KEY:demo}
      chat:
        options:
          model: gpt-4o

logging:
  level:
    com.edu.agent: DEBUG
